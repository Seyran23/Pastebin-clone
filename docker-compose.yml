services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pastebin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      PORT: 8080
      API_URL: http://localhost:8080
      CLIENT_URL: http://localhost:3000
      DB_NAME: pastebin
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379
    env_file:
      - path: ./server/.env.local
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8080
    ports:
      - '3000:3000'
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
