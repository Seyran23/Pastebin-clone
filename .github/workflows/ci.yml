name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint · typecheck · test · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  client:
    name: Client — typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8080

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: [server, client]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger server deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_SERVER }}"

      - name: Trigger client deploy
        run: curl -s "${{ secrets.RENDER_DEPLOY_HOOK_CLIENT }}"
